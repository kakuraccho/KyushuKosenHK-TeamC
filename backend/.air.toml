# /backend/.air.toml
root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", ".git"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  stop_on_error = true
  kill_delay = "2s"

[color]
  main = "magenta"
  watcher = "cyan"

[log]
  time = true

[misc]
  clean_on_exit = true

[watcher]
  poll = true
  poll_interval = 1000